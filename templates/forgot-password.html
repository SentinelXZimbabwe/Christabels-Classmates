<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= GLOBAL ================= */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #0f0f0f, #070707);
    color: white;

    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    padding: 16px;
}

/* ================= CONTAINER ================= */
.box {
    width: 100%;
    max-width: 360px;

    background: #1b1b1b;
    border: 1px solid #2a2a2a;
    border-radius: 14px;

    padding: 22px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* ================= TITLE ================= */
h2 {
    margin: 0 0 10px 0;
    font-size: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* ================= SUBTEXT ================= */
.subtext {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 15px;
}

/* ================= INPUT ================= */
input {
    width: 100%;
    padding: 12px;

    margin: 8px 0;

    border-radius: 10px;
    border: 1px solid #2a2a2a;

    background: #0f0f0f;
    color: white;

    outline: none;
    font-size: 14px;
}

input:focus {
    border-color: #2196f3;
    box-shadow: 0 0 6px rgba(33, 150, 243, 0.3);
}

/* ================= BUTTON ================= */
button {
    width: 100%;
    padding: 12px;

    margin-top: 10px;

    border: none;
    border-radius: 10px;

    background: linear-gradient(135deg, #2196f3, #03a9f4);
    color: white;

    font-weight: bold;
    cursor: pointer;

    font-size: 14px;
}

button:hover {
    opacity: 0.9;
}

/* ================= LINKS ================= */
.footer {
    margin-top: 12px;
    font-size: 13px;
    text-align: center;
    color: #aaa;
}

a {
    color: #03a9f4;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* ================= MOBILE ================= */
@media (max-width: 400px) {

    .box {
        padding: 18px;
        border-radius: 12px;
    }

    h2 {
        font-size: 18px;
    }

    input, button {
        font-size: 13px;
    }
}

</style>
</head>

<body>

<div class="box">

    <h2>
        <i class="fa-solid fa-key" style="color:#03a9f4;"></i>
        Forgot Password
    </h2>

    <div class="subtext">
        Enter your email to receive a password reset link
    </div>

    <form method="POST">

        <input type="email" name="email" placeholder="Enter your email" required>

        <button type="submit">
            Send Reset Link
        </button>

    </form>

    <div class="footer">
        Back to <a href="/login">Login</a>
    </div>

</div>

</body>
</html>
