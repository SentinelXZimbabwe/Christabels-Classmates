<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #0f0f0f, #070707);
            color: white;

            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            padding: 16px;
        }

        /* ================= LOGIN BOX ================= */
        .box {
            width: 100%;
            max-width: 360px;

            background: #1b1b1b;
            border: 1px solid #2a2a2a;
            border-radius: 14px;

            padding: 22px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);

            text-align: center;
        }

        /* ================= LOGO ================= */
        .logo {
            width: 65px;
            height: 65px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(3,169,244,0.25));
        }

        /* ================= TITLE ================= */
        h2 {
            margin: 0 0 10px 0;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .subtext {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
        }

        /* ================= INPUTS ================= */
        input {
            width: 100%;
            padding: 12px;

            margin: 8px 0;

            border-radius: 10px;
            border: 1px solid #2a2a2a;

            background: #0f0f0f;
            color: white;

            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: #2196f3;
            box-shadow: 0 0 6px rgba(33, 150, 243, 0.3);
        }

        /* ================= BUTTON ================= */
        button {
            width: 100%;
            padding: 12px;

            margin-top: 10px;

            border: none;
            border-radius: 10px;

            background: linear-gradient(135deg, #2196f3, #03a9f4);
            color: white;

            font-weight: bold;
            cursor: pointer;

            font-size: 14px;
        }

        button:hover {
            opacity: 0.9;
        }

        /* ================= FOOTER LINKS ================= */
        .links {
            margin-top: 12px;
            font-size: 13px;

            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .links a {
            color: #03a9f4;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 400px) {

            .box {
                padding: 18px;
                border-radius: 12px;
            }

            .logo {
                width: 55px;
                height: 55px;
            }

            h2 {
                font-size: 18px;
            }

            input, button {
                font-size: 13px;
            }

            .links {
                flex-direction: column;
                align-items: center;
                gap: 6px;
            }
        }

    </style>
</head>

<body>

<div class="box">

    <!-- ✅ LOGO -->
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <h2>
        <i class="fa-solid fa-right-to-bracket" style="color:#03a9f4;"></i>
        Login
    </h2>

    <div class="subtext">
        Access Christabel’s Platform
    </div>

    <form method="POST">

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">
            <i class="fa-solid fa-unlock"></i> Login
        </button>

    </form>

    <!-- LINKS -->
    <div class="links">
        <a href="/forgot-password">
            <i class="fa-solid fa-key"></i> Forgot Password
        </a>

        <a href="/create-account">
            Create Account
        </a>
    </div>

</div>

</body>
</html>
