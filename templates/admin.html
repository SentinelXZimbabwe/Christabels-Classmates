<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Christabel Admin Console</title>

<!-- ICONS -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #0f0f0f, #050505);
    color: white;
}

/* HEADER */
.header {
    padding: 25px;
    text-align: center;
    background: rgba(255, 255, 255, 0.04);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.header h2 {
    margin: 0;
    font-size: 24px;
}

.header small {
    color: #888;
}

/* LAYOUT */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* GLASS BOX */
.box {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    backdrop-filter: blur(12px);
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 10px;

    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(0, 0, 0, 0.3);
    color: white;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;

    background: linear-gradient(90deg, #00c853, #00e5ff);
    color: black;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.02);
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    text-align: left;
}

th {
    color: #00e5ff;
    font-weight: 600;
}

/* ACTION LINKS */
a {
    color: #ff5252;
    text-decoration: none;
    margin-right: 10px;
}

a:hover {
    text-decoration: underline;
}

/* ICONS */
.icon {
    margin-right: 6px;
}

/* GRID FOR DASH */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* MOBILE */
@media (max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
    }
}

.logout {
    float: right;
    color: #ff5252;
}

</style>
</head>

<body>

{% if session.get('admin') %}

<div class="header">
    <h2>🎛️ Christabel Gospel Admin Console</h2>
    <small>Media control system</small>
    <a class="logout" href="/logout">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>
</div>

<div class="container">

    <!-- UPLOAD -->
    <div class="box">
        <h3><i class="fa-solid fa-cloud-arrow-up icon"></i>Upload Media</h3>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <input type="text" name="title" placeholder="Title (Song / Video Name)" required>

            <input type="file" name="file" required>

            <button type="submit">
                <i class="fa-solid fa-upload icon"></i>
                Upload
            </button>

        </form>
    </div>

    <!-- MEDIA LIST -->
    <div class="box">

        <h3><i class="fa-solid fa-music icon"></i>Uploaded Media Library</h3>

        <table>
            <tr>
                <th>Title</th>
                <th>Type</th>
                <th>Play</th>
                <th>Actions</th>
            </tr>

            {% for item in media %}
            <tr>
                <td>{{ item[1] }}</td>
                <td>{{ item[2] }}</td>
                <td>
                    <a href="/media/{{ item[0] }}" target="_blank">
                        <i class="fa-solid fa-play"></i> Play
                    </a>
                </td>
                <td>
                    <a href="/delete/{{ item[0] }}">
                        <i class="fa-solid fa-trash"></i> Delete
                    </a>
                </td>
            </tr>
            {% endfor %}

        </table>

    </div>

</div>

{% else %}

<!-- LOGIN VIEW -->
<div class="header">
    <h2>🔐 Admin Login</h2>
</div>

<div class="container">

    <div class="box">

        <form method="POST">

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">
                <i class="fa-solid fa-lock"></i>
                Login
            </button>

        </form>

    </div>

</div>

{% endif %}

</body>
</html>
