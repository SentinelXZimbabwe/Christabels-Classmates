<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Christabel Classmates Platform</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= GLOBAL ================= */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #121212, #050505);
    color: #fff;

    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;

    padding: 16px;
}

/* ================= MAIN CONTAINER ================= */
.container {
    width: 100%;
    max-width: 900px;
    padding: 34px 24px;
    text-align: center;

    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    backdrop-filter: blur(14px);

    box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

/* ================= TITLE ================= */
h1 {
    font-size: 36px;
    margin: 0;
    letter-spacing: 0.5px;
}

/* ================= TAGLINE ================= */
.tagline {
    color: #aaa;
    font-size: 14px;
    margin-top: 8px;
    margin-bottom: 28px;
    line-height: 1.4;
}

/* ================= GRID ================= */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-top: 10px;
}

/* ================= BUTTONS ================= */
a.button {
    text-decoration: none;
    color: white;

    padding: 16px 14px;
    border-radius: 14px;

    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;

    transition: 0.2s ease;
}

a.button i {
    font-size: 20px;
    color: #00ffcc;
}

a.button:hover {
    transform: translateY(-4px);
    border-color: #00ffcc;
    background: rgba(0,255,204,0.06);
}

/* ================= SOCIAL ================= */
.social {
    margin-top: 26px;
}

.social a {
    margin: 0 10px;
    font-size: 22px;
    color: #aaa;
    transition: 0.2s ease;
}

.social a:hover {
    color: #00ffcc;
    transform: scale(1.15);
}

/* ================= ADMIN LINK ================= */
.admin-link {
    margin-top: 18px;
    font-size: 12px;
}

.admin-link a {
    color: #666;
    text-decoration: none;
    transition: 0.2s;
}

.admin-link a:hover {
    color: #00ffcc;
}

/* ================= FOOTER ================= */
footer {
    margin-top: 22px;
    font-size: 11px;
    color: #666;
}

/* ================= MOBILE ================= */
@media (max-width: 600px) {

    h1 {
        font-size: 28px;
    }

    .container {
        padding: 26px 16px;
        border-radius: 18px;
    }

    .grid {
        grid-template-columns: 1fr;
    }

    a.button {
        padding: 14px;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>⛪ Christabel Classmates</h1>

    <div class="tagline">
        A digital sanctuary for worship, music, and connection.<br>
        Stream, share, and engage with gospel media.
    </div>

    <!-- MAIN ACTIONS -->
    <div class="grid">

        <a href="/create-account" class="button">
            <i class="fa-solid fa-user-plus"></i>
            Create Account
        </a>

        <a href="/login" class="button">
            <i class="fa-solid fa-right-to-bracket"></i>
            Login
        </a>

    </div>

    <!-- SOCIAL MEDIA -->
    <div class="social">

        <a href="https://www.facebook.com/share/1GYyatqS6G/" target="_blank">
            <i class="fa-brands fa-facebook"></i>
        </a>

        <a href="https://youtube.com/@christabelchristabel?si=-mvwsAnBHOaNtY8F" target="_blank">
            <i class="fa-brands fa-youtube"></i>
        </a>

    </div>

    <!-- ADMIN LINK -->
    <div class="admin-link">
        <a href="/admin">Admin Access</a>
    </div>

    <footer>
        Built for Christabel Lalaz • Gospel Media Platform v1.1
    </footer>

</div>

</body>
</html>
