<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= GLOBAL ================= */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #0f0f0f, #070707);
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 14px;
}

/* ================= CARD ================= */
.box {
    width: 100%;
    max-width: 420px;

    background: #1b1b1b;
    border: 1px solid #2a2a2a;
    border-radius: 16px;

    padding: 22px;

    box-shadow: 0 0 18px rgba(0,0,0,0.5);
    text-align: center;
}

/* ================= LOGO ================= */
.logo {
    width: 70px;
    height: 70px;
    object-fit: contain;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 10px rgba(0,230,118,0.25));
}

/* ================= HEADER ================= */
h2 {
    margin: 0;
    font-size: 20px;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.icon {
    color: #00e676;
}

.subtext {
    font-size: 13px;
    color: #aaa;
    margin-top: 6px;
    margin-bottom: 18px;
    line-height: 1.4;
}

/* ================= INPUTS ================= */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;

    border-radius: 10px;
    border: 1px solid #2a2a2a;

    background: #0f0f0f;
    color: white;

    outline: none;
    transition: 0.2s ease;
}

input:focus {
    border-color: #00e676;
    box-shadow: 0 0 0 2px rgba(0, 230, 118, 0.15);
}

/* ================= HINT TEXT ================= */
.hint {
    font-size: 12px;
    color: #777;
    margin-top: 4px;
    margin-bottom: 8px;
    text-align: left;
}

/* ================= BUTTON ================= */
button {
    width: 100%;
    padding: 12px;
    margin-top: 14px;

    border: none;
    border-radius: 10px;

    background: linear-gradient(135deg, #00c853, #00e676);
    color: black;

    font-weight: 600;
    cursor: pointer;

    transition: 0.2s ease;
}

button:active {
    transform: scale(0.98);
}

/* ================= FOOTER ================= */
.footer {
    margin-top: 14px;
    font-size: 13px;
    color: #aaa;
    text-align: center;
}

.footer a {
    color: #00e676;
    text-decoration: none;
}

/* ================= MOBILE ================= */
@media (max-width: 480px) {

    .box {
        padding: 18px;
        border-radius: 14px;
    }

    .logo {
        width: 60px;
        height: 60px;
    }

    h2 {
        font-size: 18px;
    }

    input, button {
        font-size: 14px;
    }
}

</style>
</head>

<body>

<div class="box">

    <!-- ✅ LOGO -->
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <h2>
        <i class="fa-solid fa-user-plus icon"></i>
        Create Account
    </h2>

    <div class="subtext">
        Join the platform to like, comment, and interact with media content.
    </div>

    <form method="POST">

        <input type="text" name="full_name" placeholder="Full Name" required>
        <div class="hint">Displayed publicly as your identity</div>

        <input type="text" name="username" placeholder="Username" required>
        <div class="hint">Unique handle (cannot be changed easily)</div>

        <input type="email" name="email" placeholder="Email" required>
        <div class="hint">Used for account recovery</div>

        <input type="password" name="password" placeholder="Password" required>
        <div class="hint">Use a strong password</div>

        <button type="submit">
            <i class="fa-solid fa-check"></i> Create Account
        </button>

    </form>

    <div class="footer">
        Already have an account?
        <a href="/login">Login</a>
    </div>

</div>

</body>
</html>
